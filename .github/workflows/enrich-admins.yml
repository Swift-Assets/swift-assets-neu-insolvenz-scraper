name: Enrich Insolvency Administrator Emails (one-time / on-demand)

# Manual only. Finds the missing Kanzlei e-mail for insolvency administrators that
# appear in acquirable cases, writes them to swift_v2.insolvency_administrators and
# propagates to every case. Bounded by max_admins; safe to re-run (work-list shrinks).
on:
  workflow_dispatch:
    inputs:
      max_admins:
        description: "Max administrators to process this run"
        required: false
        default: "300"
      dry_run:
        description: "Search only, do not write (1 = dry run)"
        required: false
        default: "0"

permissions:
  contents: read

concurrency:
  group: enrich-admins
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run admin e-mail enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          MAX_ADMINS: ${{ github.event.inputs.max_admins }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          REQUEST_PAUSE_SECONDS: "1.0"
        run: python scripts/enrich_admins.py
