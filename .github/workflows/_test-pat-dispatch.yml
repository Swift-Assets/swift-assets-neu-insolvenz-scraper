# TEMPORARY test workflow — delete after verifying PAT dispatch works. Safe: dry_run=true means no real data is collected.
name: "_TEST PAT Dispatch (temporary)"

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test-dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send repository_dispatch and check status
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SWIFT_ASSETS_GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Swift-Assets/swift-assets-handelsregister-scraper/dispatches \
            -d '{"event_type":"insolvency_scrape_completed","client_payload":{"limit":"1","dry_run":"true","request_interval_secs":"75","max_requests_per_hour":"48","debug":"false","triggered_by":"pat-permission-test"}}')
          echo "HTTP_STATUS=$code"
          if [ "$code" = "204" ]; then
            echo "DISPATCH_OK"
            exit 0
          else
            echo "DISPATCH_FAILED status=$code"
            exit 1
          fi
