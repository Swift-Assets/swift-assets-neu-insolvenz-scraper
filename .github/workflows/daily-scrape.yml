name: Daily Insolvency Scrape

# يعمل يومياً الساعة 00:05 بتوقيت برلين (22:05 UTC في الصيف، 23:05 UTC في الشتاء)
# نستخدم 22:05 UTC لتغطية حالة التوقيت الصيفي (CEST)
on:
  schedule:
    - cron: "5 22 * * *"
  workflow_dispatch:
    inputs:
      date_from:
        description: "تاريخ البداية (YYYY-MM-DD، فارغ = اليوم)"
        required: false
        default: ""
      date_to:
        description: "تاريخ النهاية (YYYY-MM-DD، فارغ = اليوم)"
        required: false
        default: ""
      max_details:
        description: "حد أقصى لجلب التفاصيل"
        required: false
        default: "1500"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: daily-scrape
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        id: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_DATE_FROM: ${{ github.event.inputs.date_from }}
          SCRAPE_DATE_TO: ${{ github.event.inputs.date_to }}
          MAX_DETAIL_FETCHES: ${{ github.event.inputs.max_details || '1500' }}
          DETAIL_WORKERS: "4"
        run: |
          python scraper.py

      # Option 1 (temporary): scraper still writes to public.apify_cases.
      # After it succeeds, copy / link the new neu_insolvenz_direct rows into
      # the Swift V2 entity architecture via:
      #   swift_v2.backfill_neu_insolvenz_direct_entities(null)
      # If this step fails the whole workflow fails (see docs/option-1-backfill-automation-report.md).
      - name: Run Swift V2 entity backfill
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/run_swift_v2_backfill.py

      - name: Trigger Handelsregister enrichment
        if: success()
        env:
          GH_PAT: ${{ secrets.SWIFT_ASSETS_GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "SWIFT_ASSETS_GH_PAT is not configured; skipping Handelsregister dispatch."
            exit 0
          fi

          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_PAT" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Swift-Assets/swift-assets-handelsregister-scraper/dispatches \
            -d '{
              "event_type": "insolvency_scrape_completed",
              "client_payload": {
                "limit": "180",
                "dry_run": "false",
                "request_interval_secs": "75",
                "max_requests_per_hour": "48",
                "debug": "false",
                "triggered_by": "swift-assets-neu-insolvenz-scraper",
                "source_workflow": "Daily Insolvency Scrape"
              }
            }'

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `❌ فشل سكرابر الإفلاس - ${new Date().toISOString().slice(0,10)}`;
            const body = [
              `## فشل التشغيل اليومي`,
              ``,
              `- **التاريخ:** ${new Date().toISOString()}`,
              `- **الـ Run:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `- **Workflow:** ${context.workflow}`,
              ``,
              `راجع اللوغ لمعرفة السبب.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['scraper-failure', 'automated']
            });
