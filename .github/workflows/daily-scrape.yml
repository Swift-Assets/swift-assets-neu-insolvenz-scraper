name: Daily Insolvency Scrape

# Runs daily at 18:00 Europe/Berlin.
# GitHub Actions cron is UTC-only (no DST). 16:00 UTC = 18:00 CEST (summer, current) / 19:00 CET (winter).
# يعمل يومياً الساعة 18:00 بتوقيت برلين (16:00 UTC في الصيف CEST، يصبح 19:00 برلين في الشتاء CET).
on:
  schedule:
    # 18:00 Europe/Berlin (CEST summer = 16:00 UTC; drifts to 19:00 Berlin in winter/CET since GitHub cron is UTC-only)
    - cron: "0 16 * * *"
    # 00:05 Europe/Berlin (CEST summer = 22:05 UTC previous day; drifts to 01:05 Berlin in winter/CET)
    # تشغيل ثانٍ يومياً الساعة 00:05 بتوقيت برلين لالتقاط أحدث إعلانات الإفلاس
    - cron: "5 22 * * *"
  workflow_dispatch:
    inputs:
      date_from:
        description: "تاريخ البداية (YYYY-MM-DD، فارغ = اليوم)"
        required: false
        default: ""
      date_to:
        description: "تاريخ النهاية (YYYY-MM-DD، فارغ = اليوم)"
        required: false
        default: ""
      max_details:
        description: "حد أقصى لجلب التفاصيل"
        required: false
        default: "5000"

permissions:
  contents: read
  issues: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: daily-scrape
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        id: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_DATE_FROM: ${{ github.event.inputs.date_from }}
          SCRAPE_DATE_TO: ${{ github.event.inputs.date_to }}
          MAX_DETAIL_FETCHES: ${{ github.event.inputs.max_details || '5000' }}
          DETAIL_WORKERS: "6"
        run: |
          python scraper.py

      # Option 1 (temporary): scraper still writes to public.apify_cases.
      # After it succeeds, copy / link the new neu_insolvenz_direct rows into
      # the Swift V2 entity architecture via:
      #   swift_v2.backfill_neu_insolvenz_direct_entities(null)
      # If this step fails the whole workflow fails (see docs/option-1-backfill-automation-report.md).
      - name: Run Swift V2 entity backfill
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/run_swift_v2_backfill.py

      - name: Notify on failure
        if: failure()
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const title = `❌ فشل سكرابر الإفلاس - ${new Date().toISOString().slice(0,10)}`;
            const body = [
              `## فشل التشغيل اليومي`,
              ``,
              `- **التاريخ:** ${new Date().toISOString()}`,
              `- **الـ Run:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `- **Workflow:** ${context.workflow}`,
              ``,
              `راجع اللوغ لمعرفة السبب.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['scraper-failure', 'automated']
            });
